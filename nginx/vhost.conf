server {
    listen 80;
    listen 443 ssl;
    server_name default_replace_8888;
    index index.php index.html index.htm;
    root /wwwroot/default_replace_8888;

    # HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
       return 301 https://$host$request_uri;
    }
    #HTTP_TO_HTTPS_END

    
    # HTTPS-START
    #ssl_certificate    /ssl/default_replace_8888/fullchain.pem;
    #ssl_certificate_key    /ssl/default_replace_8888/privkey.pem;
    # HTTPS-END

    # 限制请求频率
    # limit_req zone=wordpress burst=100 nodelay;
    # 针对WordPress的特定限速
    # limit_rate 1m;  # 对WordPress动态内容限制为1MB/s

    # 安全规则
    location ~* ^/(wp-content|wp-includes|wp-admin/includes)/.*\.(txt|log|md|php)$ {
        deny all;
    }
    # 禁止访问敏感文件
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md|wp-config-sample.php|xmlrpc.php|wp-config.php) {
        deny all;
    }
    # 允许 Let's Encrypt 验证
    location ~ \.well-known {
        allow all;
    }
    # 禁止将敏感文件放入证书验证目录
    location ~ ^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$ {
        deny all;
    }
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
    # WordPress 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|otf|webp|avif)$ {
        expires max;
        add_header Cache-Control "public, no-transform";
        add_header X-Asset-Cache "HIT";
    }

    ###### 设置是否跳过缓存
    set $skip_cache 0;
    # WordPress Feed 和 Sitemap 规则
    location ~* \.(xml|xsl)$ {
        expires off; # 禁用缓存
    }
    # WooCommerce - 禁用购物车和结算页面
    if ($request_uri ~* "/cart.*|/checkout.*" ) {
        set $skip_cache 1;
    }
    # 所有 POST 请求不缓存
    if ($request_method = POST) {
        set $skip_cache 1;
    }
    # 所有GET请求不缓存
    if ($query_string != "") {
        set $skip_cache 1;
    }
    # 后台等特定页面不缓存（其他需求请自行添加即可）
    if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
        set $skip_cache 1;
    }   
    # 对登录用户、评论过的用户不展示缓存
    if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
        set $skip_cache 1;
    }
    # WordPress 核心规则
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    # WordPress 固定链接重写规则
    rewrite /wp-admin$ $scheme://$host$uri/ permanent;

    # PHP 处理
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php83:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # 启用 fastcgi 缓存
        fastcgi_cache wordpress;
        # fastcgi 对 200 301 302 缓存有效时间
        fastcgi_cache_valid 200 301 302 2h;
        # 跳过缓存
        fastcgi_cache_bypass $skip_cache;
        # 不缓存
        fastcgi_no_cache $skip_cache;
        # 添加 fastcgi 缓存状态头
        add_header X-FastCGI-Cache $upstream_cache_status;
    }
    # WordPress 专用日志
    error_log /var/log/nginx/default_replace_8888.error.log warn;
    access_log /var/log/nginx/default_replace_8888.access.log main;
}
